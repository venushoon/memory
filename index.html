<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메모리 챌린지 Pro - 교실용 완성판</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Fredoka:wght@600;700&display=swap');
        
        * { box-sizing: border-box; }
        body { 
            font-family: 'Gaegu', cursive; 
            transition: background 0.5s ease;
            overflow: hidden;
            margin: 0;
        }
        
        /* 테마 스타일 */
        body.dark { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; }
        body.light { background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); color: #1e293b; }

        .card-flip { perspective: 1000px; }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform-style: preserve-3d;
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .card-back { transform: rotateY(180deg); }

        @keyframes particle-burst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        .particle {
            position: fixed; pointer-events: none; font-size: 2rem;
            animation: particle-burst 0.8s ease-out forwards; z-index: 100;
        }

        .scroll-area::-webkit-scrollbar { width: 6px; }
        .scroll-area::-webkit-scrollbar-thumb { background: rgba(100, 100, 100, 0.5); border-radius: 3px; }
    </style>
</head>
<body class="dark">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // 📢 음성 및 효과음 매니저
        const SoundManager = {
            tts: (text) => {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ko-KR';
                utterance.rate = 1.1;
                window.speechSynthesis.speak(utterance);
            },
            playMatch: (label) => {
                const msgs = ["정답이에요!", "와우!", "대단해요!", "딩동댕!"];
                const msg = msgs[Math.floor(Math.random() * msgs.length)];
                SoundManager.tts(`${label ? label + '.' : ''} ${msg}`);
            },
            playMismatch: () => {
                const msgs = ["틀렸어요", "아쉬워요", "다시 해봐요"];
                SoundManager.tts(msgs[Math.floor(Math.random() * msgs.length)]);
            }
        };

        const MemoryGame = () => {
            const [screen, setScreen] = useState('home'); 
            const [theme, setTheme] = useState('dark');
            const [isPaused, setIsPaused] = useState(false);
            const [difficulty, setDifficulty] = useState(4); // 쌍의 개수 (8장)
            const [playerMode, setPlayerMode] = useState('single');
            const [timeLimit, setTimeLimit] = useState(0);
            const [images, setImages] = useState([]);
            const [imageLabels, setImageLabels] = useState({});
            const [useTextMatching, setUseTextMatching] = useState(false);
            const [cards, setCards] = useState([]);
            const [flipped, setFlipped] = useState([]);
            const [solved, setSolved] = useState([]);
            const [timer, setTimer] = useState(0);
            const [timeRemaining, setTimeRemaining] = useState(0);
            const [isActive, setIsActive] = useState(false);
            const [gameFinished, setGameFinished] = useState(false);
            const [currentPlayer, setCurrentPlayer] = useState(1);
            const [scores, setScores] = useState({ player1: 0, player2: 0 });
            const [particles, setParticles] = useState([]);
            const [hints, setHints] = useState(3);
            const [hintedCards, setHintedCards] = useState([]);
            const particleTimeout = useRef(null);

            // 테마 적용
            useEffect(() => {
                document.body.className = theme;
            }, [theme]);

            const handleImageUpload = (e) => {
                const files = Array.from(e.target.files);
                const newImages = files.map(file => URL.createObjectURL(file));
                setImages(prev => [...prev, ...newImages].slice(0, 16));
            };

            const startGame = () => {
                if (images.length < difficulty) {
                    alert(`최소 ${difficulty}개 이상의 이미지가 필요합니다!`);
                    return;
                }

                const selectedImages = images.slice(0, difficulty);
                let deck = [];
                
                selectedImages.forEach((url, idx) => {
                    const label = imageLabels[idx] || `그림 ${idx + 1}`;
                    if (useTextMatching) {
                        deck.push({ pairId: idx, url, label, type: 'image' });
                        deck.push({ pairId: idx, url, label, type: 'text' });
                    } else {
                        deck.push({ pairId: idx, url, label, type: 'image' });
                        deck.push({ pairId: idx, url, label, type: 'image' });
                    }
                });
                
                deck = deck.sort(() => Math.random() - 0.5).map((card, idx) => ({ ...card, index: idx }));
                
                setCards(deck);
                setSolved([]);
                setFlipped([]);
                setTimer(0);
                setTimeRemaining(timeLimit);
                setCurrentPlayer(1);
                setScores({ player1: 0, player2: 0 });
                setHints(3);
                setIsActive(true);
                setGameFinished(false);
                setIsPaused(false);
                setScreen('playing');
                SoundManager.tts("게임을 시작합니다!");
            };

            useEffect(() => {
                let interval = null;
                if (isActive && !gameFinished && !isPaused) {
                    interval = setInterval(() => {
                        setTimer(t => t + 1);
                        if (timeLimit > 0) {
                            setTimeRemaining(t => {
                                if (t <= 1) {
                                    setGameFinished(true);
                                    setIsActive(false);
                                    SoundManager.tts("시간이 종료되었습니다.");
                                    return 0;
                                }
                                return t - 1;
                            });
                        }
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [isActive, gameFinished, isPaused, timeLimit]);

            const handleCardClick = (id) => {
                if (isPaused || flipped.length === 2 || solved.includes(id) || flipped.includes(id)) return;

                const newFlipped = [...flipped, id];
                setFlipped(newFlipped);

                if (newFlipped.length === 2) {
                    const [first, second] = newFlipped;
                    if (cards[first].pairId === cards[second].pairId) {
                        setSolved([...solved, first, second]);
                        setFlipped([]);
                        SoundManager.playMatch(cards[first].label);
                        
                        if (playerMode === 'dual') {
                            setScores(prev => ({
                                ...prev,
                                [currentPlayer === 1 ? 'player1' : 'player2']: prev[currentPlayer === 1 ? 'player1' : 'player2'] + 1
                            }));
                        }

                        // 파티클 효과
                        const x = Math.random() * window.innerWidth;
                        const y = Math.random() * window.innerHeight;
                        const emojis = ['⭐', '✨', '🎈', '👍'];
                        const newParticles = Array.from({length: 10}).map(() => ({
                            id: Math.random(),
                            x, y,
                            tx: (Math.random() - 0.5) * 300,
                            ty: (Math.random() - 0.5) * 300,
                            emoji: emojis[Math.floor(Math.random() * emojis.length)]
                        }));
                        setParticles(newParticles);
                        setTimeout(() => setParticles([]), 800);

                    } else {
                        setTimeout(() => {
                            setFlipped([]);
                            SoundManager.playMismatch();
                            if (playerMode === 'dual') setCurrentPlayer(currentPlayer === 1 ? 2 : 1);
                        }, 1200);
                    }
                }
            };

            useEffect(() => {
                if (solved.length > 0 && solved.length === cards.length) {
                    setGameFinished(true);
                    setIsActive(false);
                    SoundManager.tts("모든 카드를 맞췄습니다! 축하합니다.");
                }
            }, [solved, cards.length]);

            // --- UI 렌더링 시작 ---

            if (screen === 'home') {
                return (
                    <div className="flex h-screen items-center justify-center p-4">
                        <div className="text-center space-y-8 max-w-lg w-full">
                            <h1 className="text-7xl font-bold text-yellow-400 drop-shadow-lg">🧠 메모리 챌린지</h1>
                            <div className="bg-white/10 p-6 rounded-2xl backdrop-blur-md border border-white/20">
                                <p className="text-xl mb-6">그림을 업로드하여 나만의 퀴즈를 만드세요!</p>
                                <button onClick={() => setScreen('setup')} className="w-full py-5 bg-yellow-500 hover:bg-yellow-400 text-slate-900 text-2xl font-bold rounded-2xl transition-all shadow-xl">
                                    시작하기
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (screen === 'setup' || screen === 'difficulty') {
                return (
                    <div className="flex h-screen items-center justify-center p-4 overflow-y-auto scroll-area">
                        <div className={`rounded-3xl p-10 max-w-2xl w-full shadow-2xl border-2 border-yellow-400 ${theme === 'dark' ? 'bg-slate-800' : 'bg-white text-slate-900'}`}>
                            <h2 className="text-4xl font-bold mb-6 text-yellow-500 text-center">⚙️ 게임 설정</h2>
                            
                            <div className="space-y-6">
                                <div>
                                    <label className="block mb-2 font-bold">1. 사진 업로드 ({images.length}개)</label>
                                    <input type="file" multiple accept="image/*" onChange={handleImageUpload} className="block w-full text-sm mb-4 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-500 file:text-white cursor-pointer" />
                                    <div className="grid grid-cols-5 gap-2 max-h-32 overflow-y-auto p-2 bg-black/10 rounded-lg">
                                        {images.map((img, i) => (
                                            <div key={i} className="relative">
                                                <img src={img} className="w-full h-12 object-cover rounded border border-white/20" />
                                                <input type="text" placeholder="단어" value={imageLabels[i] || ''} onChange={(e) => setImageLabels({...imageLabels, [i]: e.target.value})} className="w-full text-[10px] mt-1 p-1 bg-slate-700 text-white border-0 rounded" />
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div>
                                    <label className="block mb-2 font-bold">2. 난이도 (카드 수)</label>
                                    <div className="grid grid-cols-4 gap-2">
                                        {[4, 6, 8, 10].map(val => (
                                            <button key={val} onClick={() => setDifficulty(val)} className={`py-3 rounded-xl font-bold transition-all ${difficulty === val ? 'bg-yellow-500 text-slate-900' : 'bg-slate-700 text-white'}`}>
                                                {val*2}장
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="flex items-center gap-4 p-4 bg-purple-500/20 rounded-xl">
                                    <input type="checkbox" checked={useTextMatching} onChange={e => setUseTextMatching(e.target.checked)} className="w-5 h-5" />
                                    <span className="font-bold">📝 그림-텍스트 매칭 모드 사용</span>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => setPlayerMode('single')} className={`p-4 rounded-xl border-2 transition-all ${playerMode === 'single' ? 'border-green-400 bg-green-400/20' : 'border-transparent bg-slate-700'}`}>🎯 혼자하기</button>
                                    <button onClick={() => setPlayerMode('dual')} className={`p-4 rounded-xl border-2 transition-all ${playerMode === 'dual' ? 'border-red-400 bg-red-400/20' : 'border-transparent bg-slate-700'}`}>👥 대결하기</button>
                                </div>

                                <div className="flex gap-4">
                                    <button onClick={() => setScreen('home')} className="flex-1 py-4 bg-slate-600 rounded-xl">뒤로</button>
                                    <button onClick={startGame} className="flex-[2] py-4 bg-yellow-500 text-slate-900 font-bold text-xl rounded-xl">게임 시작! 🚀</button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (screen === 'playing') {
                return (
                    <div className="flex h-screen flex-col md:flex-row p-4 gap-4 overflow-hidden">
                        {/* 상단 컨트롤러 (모바일/전자칠판 대응) */}
                        <div className={`w-full md:w-64 p-6 rounded-2xl border-2 border-yellow-400 flex flex-col gap-4 ${theme === 'dark' ? 'bg-slate-800' : 'bg-white'}`}>
                            <div className="flex justify-between items-center">
                                <h2 className="text-2xl font-bold text-yellow-500">STATS</h2>
                                <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} className="p-2 rounded-full bg-slate-700 text-white">
                                    {theme === 'dark' ? '☀️' : '🌙'}
                                </button>
                            </div>

                            <div className="text-center p-4 bg-black/20 rounded-xl">
                                <p className="text-xs opacity-60">TIMER</p>
                                <p className="text-4xl font-mono font-bold text-yellow-400">{timer}s</p>
                            </div>

                            <button onClick={() => setIsPaused(!isPaused)} className={`py-4 rounded-xl font-bold text-xl ${isPaused ? 'bg-green-500 text-white animate-pulse' : 'bg-red-500/20 text-red-500 border border-red-500'}`}>
                                {isPaused ? '▶️ 재개하기' : '⏸️ 일시정지'}
                            </button>

                            {playerMode === 'dual' && (
                                <div className="space-y-2 mt-4">
                                    <div className={`p-3 rounded-xl border-2 ${currentPlayer === 1 ? 'border-blue-400 bg-blue-400/20' : 'border-transparent bg-black/10 opacity-50'}`}>
                                        학생 1: {scores.player1}점
                                    </div>
                                    <div className={`p-3 rounded-xl border-2 ${currentPlayer === 2 ? 'border-red-400 bg-red-400/20' : 'border-transparent bg-black/10 opacity-50'}`}>
                                        학생 2: {scores.player2}점
                                    </div>
                                </div>
                            )}

                            <button onClick={() => setScreen('setup')} className="mt-auto py-3 bg-slate-700 text-white rounded-xl">🔄 다시 설정</button>
                        </div>

                        {/* 메인 게임판 */}
                        <div className="flex-1 relative flex flex-wrap justify-center content-center gap-3 bg-black/10 rounded-3xl p-6 border-2 border-dashed border-white/10">
                            {cards.map((card, idx) => (
                                <div 
                                    key={idx} 
                                    onClick={() => handleCardClick(idx)}
                                    className={`card-flip rounded-xl cursor-pointer ${solved.includes(idx) ? 'opacity-40 grayscale-[0.5]' : ''}`}
                                    style={{
                                        width: difficulty <= 6 ? '22%' : '18%',
                                        aspectRatio: '3/4'
                                    }}
                                >
                                    <div className={`card-inner ${flipped.includes(idx) || solved.includes(idx) ? 'flipped' : ''}`}>
                                        <div className="card-front bg-gradient-to-br from-blue-500 to-indigo-700 border-4 border-white shadow-xl">
                                            <span className="text-5xl text-white font-bold">?</span>
                                        </div>
                                        <div className="card-back bg-white border-4 border-yellow-400 shadow-xl overflow-hidden p-2">
                                            {card.type === 'text' ? (
                                                <span className="text-slate-900 font-bold text-2xl text-center break-words leading-tight">{card.label}</span>
                                            ) : (
                                                <img src={card.url} className="w-full h-full object-cover rounded-md" />
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ))}

                            {/* 일시정지 오버레이 */}
                            {isPaused && (
                                <div className="absolute inset-0 bg-slate-900/95 backdrop-blur-sm z-50 flex flex-col items-center justify-center rounded-3xl">
                                    <h2 className="text-5xl font-bold text-white mb-8">PAUSED</h2>
                                    <button onClick={() => setIsPaused(false)} className="px-12 py-5 bg-yellow-500 text-slate-900 text-3xl font-bold rounded-full shadow-2xl hover:scale-110 transition-transform">
                                        계속하기 ▶️
                                    </button>
                                </div>
                            )}

                            {/* 게임 종료 오버레이 */}
                            {gameFinished && (
                                <div className="absolute inset-0 bg-yellow-500 flex flex-col items-center justify-center z-[60] rounded-3xl text-slate-900 p-10 text-center animate-in fade-in zoom-in duration-300">
                                    <h2 className="text-7xl mb-4">🏆</h2>
                                    <h2 className="text-5xl font-bold mb-6">게임 완료!</h2>
                                    <div className="text-3xl font-bold mb-8 space-y-2">
                                        <p>기록: {timer}초</p>
                                        {playerMode === 'dual' && (
                                            <p className="text-indigo-800">
                                                결과: {scores.player1 > scores.player2 ? '학생 1 승리!' : scores.player2 > scores.player1 ? '학생 2 승리!' : '무승부!'}
                                            </p>
                                        )}
                                    </div>
                                    <div className="flex gap-4 w-full max-w-sm">
                                        <button onClick={startGame} className="flex-1 py-4 bg-slate-900 text-white rounded-2xl font-bold text-xl">다시 하기</button>
                                        <button onClick={() => setScreen('setup')} className="flex-1 py-4 bg-white text-slate-900 rounded-2xl font-bold text-xl border-2 border-slate-900">설정으로</button>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* 파티클 레이어 */}
                        {particles.map(p => (
                            <div key={p.id} className="particle" style={{left: p.x, top: p.y, '--tx': `${p.tx}px`, '--ty': `${p.ty}px`}}>
                                {p.emoji}
                            </div>
                        ))}
                    </div>
                );
            }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MemoryGame />);
    </script>
</body>
</html>
